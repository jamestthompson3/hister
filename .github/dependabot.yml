version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      go-deps:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-deps:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      gha-deps:
        patterns:
          - '*'

  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      nix-deps:
        patterns:
          - '*'
