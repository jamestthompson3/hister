root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/hister"
  cmd = "go build -o ./tmp/hister ."
  delay = 1000
  exclude_dir = ["tmp", "node_modules", "webui", "vendor", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
